<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Inventario"/>
<title>Control de Stock</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:#0f0f13;color:#f0ede8;font-family:'Courier New',monospace;min-height:100vh;}
  input,select,button{font-family:'Courier New',monospace;outline:none;}
  input::placeholder{color:#555;}

  /* Header */
  #header{background:#1a1a22;border-bottom:2px solid #2a2a36;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10;position:sticky;top:0;z-index:100;}
  #header-title{font-size:17px;font-weight:700;letter-spacing:1px;}
  #header-sub{font-size:10px;letter-spacing:3px;color:#888;margin-bottom:3px;}
  #badges{display:flex;gap:8px;}
  .badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;}
  .badge-red{background:#3d1a1a;color:#ef4444;}
  .badge-yellow{background:#3a2f00;color:#eab308;}

  /* Tabs */
  #tabs{display:flex;background:#15151c;border-bottom:1px solid #2a2a36;position:sticky;top:57px;z-index:99;}
  .tab{flex:1;padding:12px;border:none;border-bottom:2px solid transparent;background:transparent;color:#666;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;letter-spacing:1px;}
  .tab.active{background:#1e1e2e;color:#a78bfa;border-bottom-color:#a78bfa;}

  /* Main */
  #main{max-width:700px;margin:0 auto;padding:20px 14px 60px;}

  /* Meta box */
  #meta-box{display:grid;grid-template-columns:1fr 1fr;gap:12px;background:#1a1a22;border-radius:10px;padding:14px;border:1px solid #2a2a36;margin-bottom:16px;}
  .meta-label{font-size:10px;color:#888;letter-spacing:2px;display:block;margin-bottom:6px;}
  .field{width:100%;background:#0f0f13;border:1px solid #3a3a50;color:#f0ede8;padding:8px 10px;border-radius:7px;font-size:14px;font-family:inherit;}
  select.field option{background:#1a1a22;}

  /* Search */
  #search{width:100%;background:#1a1a22;border:1px solid #2a2a36;color:#f0ede8;padding:10px 14px;border-radius:8px;font-size:14px;font-family:inherit;margin-bottom:14px;}

  /* Category */
  .cat-block{margin-bottom:14px;background:#1a1a22;border-radius:10px;border:1px solid #2a2a36;overflow:hidden;}
  .cat-header{padding:10px 14px;background:#1e1e2e;display:flex;align-items:center;justify-content:space-between;}
  .cat-name{font-size:11px;font-weight:700;letter-spacing:3px;color:#a78bfa;}
  .cat-btns{display:flex;gap:6px;}
  .btn-add-item{background:#2a2a40;border:none;color:#a78bfa;border-radius:6px;padding:4px 10px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;}
  .btn-del-cat{background:#3d1a1a;border:none;color:#ef4444;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:13px;}

  /* Item row */
  .item-row{display:grid;grid-template-columns:1fr 62px auto auto auto;gap:5px;align-items:center;padding:7px 12px;border-bottom:1px solid #1e1e2e;}
  .item-name{font-size:13px;color:#ccc;word-break:break-word;}
  .qty-input{width:62px;background:#0f0f13;border:1px solid #333;color:#f0ede8;padding:5px 4px;border-radius:5px;font-size:13px;text-align:center;font-family:inherit;}
  .status-btns{display:flex;gap:3px;}
  .status-btn{width:26px;height:26px;border-radius:5px;border:none;cursor:pointer;font-size:13px;background:#0f0f13;transition:all .15s;}
  .status-btn.active-verde{background:#22c55e33;outline:2px solid #22c55e;}
  .status-btn.active-amarillo{background:#eab30833;outline:2px solid #eab308;}
  .status-btn.active-rojo{background:#ef444433;outline:2px solid #ef4444;}
  .btn-pedir{background:#1e1e2e;color:#555;border:none;border-radius:5px;padding:4px 6px;cursor:pointer;font-family:inherit;font-size:10px;font-weight:700;letter-spacing:1px;white-space:nowrap;}
  .btn-pedir.active{background:#7c3aed;color:#fff;}
  .btn-del-item{background:none;border:none;color:#555;font-size:15px;cursor:pointer;padding:0 2px;}

  .cat-empty{padding:12px 16px;color:#444;font-size:12px;text-align:center;}

  /* New category button */
  #btn-new-cat{width:100%;padding:11px;border-radius:9px;border:1px dashed #3a3a50;background:transparent;color:#666;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;margin-bottom:12px;letter-spacing:1px;}

  /* Generate button */
  #btn-generar{width:100%;padding:14px;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;border:none;cursor:pointer;font-family:inherit;font-size:15px;font-weight:700;letter-spacing:2px;margin-bottom:20px;box-shadow:0 4px 20px #7c3aed55;}
  #btn-limpiar{width:100%;padding:11px;border-radius:9px;border:1px solid #2a3a2a;background:transparent;color:#4ade80;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;margin-bottom:10px;letter-spacing:1px;}

  /* Result */
  #result-btns{display:flex;gap:10px;margin-bottom:14px;}
  .result-btn{flex:1;padding:12px;border-radius:8px;background:#1e1e2e;border:1px solid #333;color:#888;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;}
  #btn-copiar{color:#a78bfa;border-color:#a78bfa44;}
  #result-pre{background:#1a1a22;border:1px solid #2a2a36;border-radius:10px;padding:18px;font-size:13px;line-height:1.8;white-space:pre-wrap;color:#f0ede8;overflow-x:auto;}
  #result-empty{text-align:center;color:#555;padding:60px 20px;font-size:14px;line-height:2;}

  /* Modal */
  #modal-overlay{display:none;position:fixed;inset:0;background:#000000bb;z-index:1000;align-items:center;justify-content:center;padding:16px;}
  #modal-overlay.show{display:flex;}
  .modal-box{background:#1a1a22;border:1px solid #3a3a50;border-radius:12px;padding:22px;width:100%;max-width:400px;}
  .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .modal-title{font-weight:700;font-size:14px;color:#a78bfa;letter-spacing:1px;}
  .modal-close{background:none;border:none;color:#666;font-size:18px;cursor:pointer;}
  .modal-input{width:100%;background:#0f0f13;border:1px solid #3a3a50;color:#f0ede8;padding:9px 12px;border-radius:7px;font-family:inherit;font-size:14px;margin-bottom:12px;}
  .modal-input::placeholder{color:#555;}
  .btn-primary{width:100%;padding:10px;border-radius:7px;border:none;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;}
  .modal-body-text{color:#ccc;font-size:13px;margin-bottom:20px;line-height:1.6;}
  .modal-body-text strong{color:#f0ede8;}
  .modal-action-btns{display:flex;gap:10px;}
  .btn-cancel{flex:1;padding:10px;border-radius:7px;border:1px solid #333;background:#1e1e2e;color:#888;cursor:pointer;font-family:inherit;font-size:13px;}
  .btn-danger{flex:1;padding:10px;border-radius:7px;border:none;background:#7f1d1d;color:#fca5a5;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;}

  /* Toast */
  #toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:#7c3aed;color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:700;opacity:0;transition:all .3s;z-index:2000;pointer-events:none;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div>
    <div id="header-sub">SISTEMA DE INVENTARIO</div>
    <div id="header-title">📋 Control de Stock</div>
  </div>
  <div id="badges">
    <span class="badge badge-red" id="badge-red">🔴 0</span>
    <span class="badge badge-yellow" id="badge-yellow">🟡 0</span>
  </div>
</div>

<!-- Tabs -->
<div id="tabs">
  <button class="tab active" id="tab-form" onclick="switchTab('form')">📝 Ingresar</button>
  <button class="tab" id="tab-resultado" onclick="switchTab('resultado')">📄 Resultado</button>
</div>

<!-- Main content -->
<div id="main">

  <!-- FORM VIEW -->
  <div id="view-form">
    <div id="meta-box">
      <div>
        <label class="meta-label">FECHA</label>
        <input type="text" id="fecha" class="field"/>
      </div>
      <div>
        <label class="meta-label">TURNO</label>
        <select id="turno" class="field">
          <option>Mañana</option>
          <option selected>Tarde</option>
          <option>Noche</option>
        </select>
      </div>
    </div>

    <input type="search" id="search" placeholder="🔍 Buscar producto..." oninput="renderCats()" autocomplete="off"/>

    <div id="cats-container"></div>

    <button id="btn-new-cat" onclick="openModalNewCat()">＋ NUEVA CATEGORÍA</button>
    <button id="btn-limpiar" onclick="confirmarLimpiar()">🔄 NUEVO TURNO</button>
    <button id="btn-generar" onclick="generar()">✅ GENERAR INVENTARIO</button>
  </div>

  <!-- RESULT VIEW -->
  <div id="view-resultado" style="display:none;">
    <div id="result-btns">
      <button class="result-btn" id="btn-copiar" onclick="copiar()">📋 Copiar texto</button>
      <button class="result-btn" onclick="switchTab('form')">✏️ Editar</button>
    </div>
    <pre id="result-pre" style="display:none;"></pre>
    <div id="result-empty">Primero ingresa el inventario y presiona<br/><strong style="color:#a78bfa">GENERAR INVENTARIO</strong></div>
  </div>

</div>

<!-- Modal overlay -->
<div id="modal-overlay" onclick="closeModalIfOverlay(event)">
  <div class="modal-box" id="modal-box">
    <!-- dynamic content -->
  </div>
</div>

<!-- Toast -->
<div id="toast">✅ Copiado</div>

<script>
// ─── PERSISTENCIA ────────────────────────────────────────
function guardar(){
  try {
    localStorage.setItem('inv_categorias', JSON.stringify(categorias));
    localStorage.setItem('inv_datos', JSON.stringify(datos));
    localStorage.setItem('inv_fecha', document.getElementById('fecha').value);
    localStorage.setItem('inv_turno', document.getElementById('turno').value);
  } catch(e){}
}

function cargar(){
  try {
    const c = localStorage.getItem('inv_categorias');
    const d = localStorage.getItem('inv_datos');
    const f = localStorage.getItem('inv_fecha');
    const t = localStorage.getItem('inv_turno');
    if(c) categorias = JSON.parse(c);
    if(d) datos = JSON.parse(d);
    if(f) document.getElementById('fecha').value = f;
    if(t) document.getElementById('turno').value = t;
    return !!(c || d);
  } catch(e){ return false; }
}

// ─── STATE ───────────────────────────────────────────────
let categorias = [
  { nombre:"Postres", items:["Tiramisu","Muffin","Chesscake","Flan Napolitano"] },
  { nombre:"Refrescos", items:["Agua Bonafon","Agua Mineral","Mineral en lata","Squirt","Coca","Sidral","Sprite","Fanta","Fresada","Naranjada","Limonada","Clementina","Arancita","Limon menta","Melograno","Mora glitter","Strongbow","Amaretto","Jarabe endulzante"] },
  { nombre:"Leches", items:["Deslactosada","Entera","Coco","Almendra"] },
  { nombre:"Cerveza", items:["Xx 1/2","Indio 1/2","Indio L","Xx L","Amster","Pacifico","Heineken","Heineken cero","Bohemia obscura","Tecate original","Noche Buena","Modelo negra","Modelo especial","Clamato"] },
  { nombre:"Frutas", items:["Melon","Sandia","Naranjas","Fresas","Cerezas","Limones","Platanos"] },
  { nombre:"Chocolate", items:["Chocolate negro","Chocolate blanco"] },
  { nombre:"Botella de alcohol", items:["Vino tinto","Vino en botella","Vino blanco","Sisi","Malibu","Amaretto (botella)","Rompope","Baileys","Vodka","Kalua","Bacardi","Black and white","Torres","Capitan morgan","Salsa negra micheladas"] },
  { nombre:"Extras", items:["Hershey's chocolate jarabe","Café","Crema batida","Azúcar","Azúcar mascabada","Matcha","Taro","Granola","Nutella","Te verde sobre","Te negro","Te chai","Te chai vainilla","Tisana frutal","Tisana frutal cherry banana","Miel","Mazapanes","Oreo","Azúcar mascabada sobre","Azúcar sobre","Stevia","Caja Te","Sazonador pimienta limón","Desechable vaso y tapas frape","Vasos para cafe","Mermelada fresa","Mermelada zarzamora","Chisperos cumpleaños","Garrafones de agua"] },
];

let datos = {};
function key(cat, item){ return cat + '__' + item; }
function initDatos(){
  categorias.forEach(c => c.items.forEach(item => {
    if(!datos[key(c.nombre,item)]) datos[key(c.nombre,item)] = {cantidad:'',status:'verde',pedir:false};
  }));
}

// Set today's date, then try loading saved data
(function(){
  const d = new Date();
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yyyy = d.getFullYear();
  document.getElementById('fecha').value = `${dd}/${mm}/${yyyy}`;
  // cargar() and initDatos() called after all functions defined below
})();

// Save fecha/turno when changed
document.getElementById('fecha').addEventListener('input', guardar);
document.getElementById('turno').addEventListener('change', guardar);

// ─── RENDER ──────────────────────────────────────────────
function renderCats(){
  const busqueda = document.getElementById('search').value.toLowerCase();
  const container = document.getElementById('cats-container');
  container.innerHTML = '';

  categorias.forEach(cat => {
    const filtered = busqueda
      ? cat.items.filter(i => i.toLowerCase().includes(busqueda))
      : cat.items;
    if(busqueda && filtered.length === 0) return;

    const block = document.createElement('div');
    block.className = 'cat-block';

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'cat-header';
    hdr.innerHTML = `
      <span class="cat-name">${esc(cat.nombre.toUpperCase())}</span>
      <div class="cat-btns">
        <button class="btn-add-item" onclick="openModalAddItem('${esc(cat.nombre)}')">+ Agregar</button>
        <button class="btn-del-cat" onclick="confirmDeleteCat('${esc(cat.nombre)}')">🗑</button>
      </div>`;
    block.appendChild(hdr);

    // Items
    const itemsToShow = busqueda ? filtered : cat.items;
    if(itemsToShow.length === 0){
      const empty = document.createElement('div');
      empty.className = 'cat-empty';
      empty.innerHTML = 'Sin productos — presiona <strong style="color:#a78bfa">+ Agregar</strong>';
      block.appendChild(empty);
    } else {
      itemsToShow.forEach(item => {
        const d = datos[key(cat.nombre,item)] || {cantidad:'',status:'verde',pedir:false};
        const row = document.createElement('div');
        row.className = 'item-row';
        row.id = 'row_' + key(cat.nombre, item);

        const sVerde = d.status==='verde' ? 'active-verde' : '';
        const sAmar  = d.status==='amarillo' ? 'active-amarillo' : '';
        const sRojo  = d.status==='rojo' ? 'active-rojo' : '';
        const pClass = d.pedir ? 'active' : '';

        row.innerHTML = `
          <span class="item-name">${esc(item)}</span>
          <input type="text" class="qty-input" placeholder="Cant." value="${esc(d.cantidad)}"
            oninput="setField('${esc(cat.nombre)}','${esc(item)}','cantidad',this.value)" inputmode="text"/>
          <div class="status-btns">
            <button class="status-btn ${sVerde}" title="Verde — Stock óptimo"
              onclick="setStatus('${esc(cat.nombre)}','${esc(item)}','verde')">🟢</button>
            <button class="status-btn ${sAmar}" title="Amarillo — Bajo / Vigilar"
              onclick="setStatus('${esc(cat.nombre)}','${esc(item)}','amarillo')">🟡</button>
            <button class="status-btn ${sRojo}" title="Rojo — Reposición"
              onclick="setStatus('${esc(cat.nombre)}','${esc(item)}','rojo')">🔴</button>
          </div>
          <button class="btn-pedir ${pClass}"
            onclick="togglePedir('${esc(cat.nombre)}','${esc(item)}')">PEDIR</button>
          <button class="btn-del-item" onclick="confirmDeleteItem('${esc(cat.nombre)}','${esc(item)}')">✕</button>`;
        block.appendChild(row);
      });
    }

    container.appendChild(block);
  });

  updateBadges();
}

function esc(s){ return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

function updateBadges(){
  const vals = Object.values(datos);
  document.getElementById('badge-red').textContent    = '🔴 ' + vals.filter(d=>d.status==='rojo').length;
  document.getElementById('badge-yellow').textContent = '🟡 ' + vals.filter(d=>d.status==='amarillo').length;
}

// ─── FIELD UPDATES ───────────────────────────────────────
function setField(cat, item, campo, valor){
  const k = key(cat,item);
  if(!datos[k]) datos[k]={cantidad:'',status:'verde',pedir:false};
  if(campo === 'cantidad'){
    valor = sanitizeCantidad(valor);
  }
  datos[k][campo] = valor;
  updateBadges();
  guardar();
}

function setStatus(cat, item, status){
  const k = key(cat,item);
  if(!datos[k]) datos[k]={cantidad:'',status:'verde',pedir:false};
  datos[k].status = status;
  guardar();
  renderCats();
}

function togglePedir(cat, item){
  const k = key(cat,item);
  if(!datos[k]) datos[k]={cantidad:'',status:'verde',pedir:false};
  datos[k].pedir = !datos[k].pedir;
  guardar();
  renderCats();
}

// ─── GENERATE ────────────────────────────────────────────
function generar(){
  const fecha = document.getElementById('fecha').value;
  const turno = document.getElementById('turno').value;
  let out = `Inventario – ${fecha} – Turno ${turno}\n\n`;
  out += `🔴 ROJO — REPOSICIÓN\n🟡 AMARILLO — BAJO / VIGILAR\n🟢 VERDE — STOCK ÓPTIMO\n\n`;

  const STATUS_EMOJI = {verde:'🟢', amarillo:'🟡', rojo:'🔴'};
  categorias.forEach(cat => {
    const lineas = cat.items.map(item => {
      const d = datos[key(cat.nombre,item)];
      if(!d || (d.cantidad === '' && d.cantidad !== '0')) return null;
      return `- ${item}-${d.cantidad}${STATUS_EMOJI[d.status]}${d.pedir?' PEDIR':''}`;
    }).filter(Boolean);
    if(lineas.length > 0) out += `${cat.nombre}\n\n${lineas.join('\n')}\n\n`;
  });

  const pre = document.getElementById('result-pre');
  const empty = document.getElementById('result-empty');
  pre.textContent = out.trim();
  pre.style.display = 'block';
  empty.style.display = 'none';
  switchTab('resultado');
}

function copiar(){
  const text = document.getElementById('result-pre').textContent;
  if(!text) return;
  navigator.clipboard.writeText(text).then(() => showToast('✅ Copiado al portapapeles'));
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

// ─── TABS ────────────────────────────────────────────────
function switchTab(tab){
  document.getElementById('view-form').style.display      = tab==='form'      ? '' : 'none';
  document.getElementById('view-resultado').style.display = tab==='resultado' ? '' : 'none';
  document.getElementById('tab-form').classList.toggle('active', tab==='form');
  document.getElementById('tab-resultado').classList.toggle('active', tab==='resultado');
}

// ─── MODALS ──────────────────────────────────────────────
let modalCallback = null;

function openModal(html, onShow){
  document.getElementById('modal-box').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('show');
  if(onShow) onShow();
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('show');
  modalCallback = null;
}

function closeModalIfOverlay(e){
  if(e.target === document.getElementById('modal-overlay')) closeModal();
}

// Add item
function openModalAddItem(catNombre){
  openModal(`
    <div class="modal-header">
      <span class="modal-title">＋ Agregar a ${catNombre}</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <input class="modal-input" id="modal-new-item" placeholder="Nombre del producto" autocomplete="off"
      onkeydown="if(event.key==='Enter') doAddItem('${esc(catNombre)}')"/>
    <button class="btn-primary" onclick="doAddItem('${esc(catNombre)}')">Agregar</button>
  `, ()=>{ setTimeout(()=>{ const el=document.getElementById('modal-new-item'); if(el) el.focus(); },100); });
}

function doAddItem(catNombre){
  const input = document.getElementById('modal-new-item');
  const nombre = input ? input.value.trim() : '';
  if(!nombre) return;
  const cat = categorias.find(c=>c.nombre===catNombre);
  if(cat){ cat.items.push(nombre); }
  datos[key(catNombre, nombre)] = {cantidad:'',status:'verde',pedir:false};
  closeModal();
  guardar();
  renderCats();
}

// New category
function openModalNewCat(){
  openModal(`
    <div class="modal-header">
      <span class="modal-title">＋ Nueva categoría</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <input class="modal-input" id="modal-new-cat" placeholder="Nombre de la categoría" autocomplete="off"
      onkeydown="if(event.key==='Enter') doAddCat()"/>
    <button class="btn-primary" onclick="doAddCat()">Crear categoría</button>
  `, ()=>{ setTimeout(()=>{ const el=document.getElementById('modal-new-cat'); if(el) el.focus(); },100); });
}

function doAddCat(){
  const input = document.getElementById('modal-new-cat');
  const nombre = input ? input.value.trim() : '';
  if(!nombre || categorias.find(c=>c.nombre===nombre)) return;
  categorias.push({nombre, items:[]});
  closeModal();
  guardar();
  renderCats();
}

// Confirm delete item
function confirmDeleteItem(catNombre, item){
  openModal(`
    <div class="modal-header">
      <span class="modal-title">Confirmar eliminación</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <p class="modal-body-text">¿Eliminar <strong>${esc(item)}</strong> de ${esc(catNombre)}?</p>
    <div class="modal-action-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-danger" onclick="doDeleteItem('${esc(catNombre)}','${esc(item)}')">Sí, eliminar</button>
    </div>
  `);
}

function doDeleteItem(catNombre, item){
  const cat = categorias.find(c=>c.nombre===catNombre);
  if(cat) cat.items = cat.items.filter(i=>i!==item);
  delete datos[key(catNombre,item)];
  closeModal();
  guardar();
  renderCats();
}

// Confirm delete cat
function confirmDeleteCat(catNombre){
  openModal(`
    <div class="modal-header">
      <span class="modal-title">Confirmar eliminación</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <p class="modal-body-text">¿Eliminar la categoría <strong>${esc(catNombre)}</strong> y todos sus productos?</p>
    <div class="modal-action-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-danger" onclick="doDeleteCat('${esc(catNombre)}')">Sí, eliminar</button>
    </div>
  `);
}

function doDeleteCat(catNombre){
  const cat = categorias.find(c=>c.nombre===catNombre);
  if(cat) cat.items.forEach(item => delete datos[key(catNombre,item)]);
  categorias = categorias.filter(c=>c.nombre!==catNombre);
  closeModal();
  guardar();
  renderCats();
}

// ─── LIMPIAR TURNO ───────────────────────────────────────
function confirmarLimpiar(){
  openModal(`
    <div class="modal-header">
      <span class="modal-title">🔄 Nuevo turno</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <p class="modal-body-text">Esto borra todas las cantidades y semáforos para empezar un turno nuevo.<br/><br/>Los productos y categorías se mantienen.</p>
    <div class="modal-action-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-danger" style="background:#14532d;color:#86efac;" onclick="doLimpiar()">Sí, nuevo turno</button>
    </div>
  `);
}

function doLimpiar(){
  Object.keys(datos).forEach(k => {
    datos[k] = {cantidad:'', status:'verde', pedir:false};
  });
  // Update date to today
  const d = new Date();
  document.getElementById('fecha').value =
    `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
  closeModal();
  guardar();
  renderCats();
  showToast('🔄 Turno limpio — listo para ingresar');
}
